<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire の Three Chords | 帝国の三和弦</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Doto:wght@400;500;700&family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --black: #f5f5f5;
            --surface: #ffffff;
            --surface-raised: #f0f0f0;
            --border: #e8e8e8;
            --border-visible: #cccccc;
            --text-disabled: #999999;
            --text-secondary: #666666;
            --text-primary: #1a1a1a;
            --text-display: #000000;
            --accent: #d71921;
            --accent-subtle: rgba(215, 25, 33, 0.12);
            --success: #4a9e5c;
            --warning: #d4a843;
            --interactive: #007aff;
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --space-2xl: 48px;
            --space-3xl: 64px;
            --space-4xl: 96px;
            --display-xl: 72px;
            --display-lg: 48px;
            --display-md: 36px;
            --heading: 24px;
            --body: 16px;
            --body-sm: 14px;
            --caption: 12px;
            --label: 11px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
            color: var(--text-primary);
            background: var(--black);
            transition: background 220ms ease, color 220ms ease;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image: radial-gradient(circle, var(--border-visible) 0.8px, transparent 0.8px);
            background-size: 16px 16px;
            opacity: 0.15;
        }

        body[data-theme="paper"] {
            --black: #f5f5f5;
            --surface: #ffffff;
            --surface-raised: #f0f0f0;
            --border: #e8e8e8;
            --border-visible: #cccccc;
            --text-disabled: #999999;
            --text-secondary: #666666;
            --text-primary: #1a1a1a;
            --text-display: #000000;
            --interactive: #007aff;
        }

        body[data-theme="studio"] {
            --black: #efefeb;
            --surface: #fcfcfa;
            --surface-raised: #f2f2ef;
            --border: #dfdfda;
            --border-visible: #b9b9b5;
            --text-disabled: #979793;
            --text-secondary: #5f5f5a;
            --text-primary: #151515;
            --text-display: #000000;
            --interactive: #007aff;
        }

        body[data-theme="oled"] {
            --black: #000000;
            --surface: #111111;
            --surface-raised: #1a1a1a;
            --border: #222222;
            --border-visible: #333333;
            --text-disabled: #666666;
            --text-secondary: #999999;
            --text-primary: #e8e8e8;
            --text-display: #ffffff;
            --interactive: #5b9bf6;
        }

        body[data-theme="graphite"] {
            --black: #0b0b0c;
            --surface: #141415;
            --surface-raised: #1c1c1f;
            --border: #27272a;
            --border-visible: #37373b;
            --text-disabled: #6c6c71;
            --text-secondary: #9d9da3;
            --text-primary: #ececef;
            --text-display: #ffffff;
            --interactive: #5b9bf6;
        }

        body,
        button,
        input {
            font: inherit;
        }

        button,
        input {
            border: none;
            outline: none;
        }

        .stage,
        .stage *:not(input),
        .settings-drawer,
        .settings-drawer *:not(input) {
            -webkit-user-select: none;
            user-select: none;
            caret-color: transparent;
        }

        input {
            -webkit-user-select: text;
            user-select: text;
            caret-color: auto;
        }

        button {
            cursor: pointer;
            background: none;
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        ::selection {
            background: var(--accent-subtle);
            color: var(--text-display);
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-visible);
            border-radius: 999px;
        }

        .app-shell {
            position: relative;
            z-index: 1;
            width: min(1280px, calc(100% - 40px));
            min-height: 100vh;
            margin: 0 auto;
            padding: 24px 0;
            display: flex;
            align-items: stretch;
        }

        .stage {
            position: relative;
            width: 100%;
            min-height: calc(100vh - 48px);
            padding: 32px;
            border: 1px solid var(--border-visible);
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 40px;
        }

        .stage::before {
            content: "";
            position: absolute;
            inset: 16px;
            border: 1px solid var(--border);
            pointer-events: none;
        }

        .brand,
        .display-grid,
        .controls-strip {
            position: relative;
            z-index: 1;
        }

        .brand {
            display: grid;
            gap: 12px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .brand-eyebrow,
        .panel-label,
        .button-label,
        .drawer-eyebrow,
        .setting-title,
        .theme-mode {
            margin: 0;
            font-family: "Space Mono", monospace;
            font-size: var(--label);
            line-height: 1.2;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .brand-title {
            margin: 0;
            max-width: none;
            white-space: nowrap;
            font-size: clamp(2.8rem, 7vw, 5.8rem);
            line-height: 0.94;
            letter-spacing: -0.08em;
            color: var(--text-display);
            font-weight: 500;
        }

        .brand-cn {
            margin: 0;
            color: var(--text-secondary);
            font-size: 0.98rem;
            line-height: 1.6;
        }

        .display-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.35fr) minmax(320px, 0.9fr);
            gap: 24px;
            align-items: stretch;
        }

        .hero-panel,
        .metric-card,
        .pool-card,
        .theme-button,
        .custom-input-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
        }

        .hero-panel {
            position: relative;
            overflow: hidden;
            min-height: 440px;
            padding: 24px;
            border-radius: 16px;
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 28px;
        }

        .hero-panel::before {
            content: "";
            position: absolute;
            top: 24px;
            right: 24px;
            width: min(42%, 220px);
            height: 128px;
            background-image: radial-gradient(circle, var(--border-visible) 1px, transparent 1px);
            background-size: 16px 16px;
            opacity: 0.18;
            pointer-events: none;
        }

        .hero-ordinal {
            position: absolute;
            top: 24px;
            right: 24px;
            font-family: "Doto", "Space Mono", monospace;
            font-size: clamp(4.8rem, 8vw, 7rem);
            line-height: 0.82;
            letter-spacing: -0.06em;
            color: var(--border-visible);
            opacity: 0.95;
        }

        .panel-head,
        .hero-caption {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .panel-index,
        .hero-caption,
        .metric-copy,
        .theme-copy,
        .current-interval,
        .pool-count {
            font-family: "Space Mono", monospace;
            font-size: var(--caption);
            line-height: 1.5;
            letter-spacing: 0.04em;
            color: var(--text-secondary);
        }

        .hero-body {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 12px;
            padding-right: min(28%, 180px);
        }

        .hero-kicker {
            margin: 0;
            font-family: "Space Mono", monospace;
            font-size: var(--label);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .hero-footer {
            display: grid;
            gap: 16px;
        }

        .result-value-slot {
            width: 100%;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            overflow: hidden;
        }

        .result-value {
            width: 100%;
            max-width: 100%;
            margin: 0;
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-display);
        }

        .result-value-hero {
            font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
            font-weight: 500;
            letter-spacing: -0.08em;
            text-align: left;
        }

        .result-value-stat {
            font-family: "Space Mono", "Noto Sans SC", monospace;
            font-weight: 400;
            letter-spacing: -0.04em;
            text-align: left;
        }

        .secondary-column {
            display: grid;
            gap: 16px;
        }

        .metric-card {
            padding: 20px;
            border-radius: 16px;
            display: grid;
            gap: 16px;
            min-height: 138px;
        }

        .metric-body {
            display: grid;
            gap: 10px;
        }

        .metric-copy {
            margin: 0;
        }

        .segment-bar {
            display: flex;
            gap: 2px;
        }

        .segment-bar.is-compact .segment {
            height: 6px;
        }

        .segment {
            flex: 1 1 0;
            height: 10px;
            background: var(--border);
        }

        .segment.is-filled {
            background: var(--text-display);
        }

        .controls-strip {
            display: grid;
            grid-template-columns: minmax(0, 1.3fr) minmax(260px, 0.7fr);
            gap: 16px;
            align-items: stretch;
        }

        .cruise-button,
        .manual-button {
            min-height: 88px;
            border-radius: 999px;
            transition: background 180ms ease, border-color 180ms ease, color 180ms ease, opacity 180ms ease;
        }

        .cruise-button {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            background: transparent;
            border: 1px solid var(--border-visible);
            color: var(--text-primary);
        }

        .cruise-button:hover {
            border-color: var(--text-primary);
        }

        .cruise-button.is-active {
            background: var(--surface);
        }

        .toggle-track {
            flex: 0 0 56px;
            width: 56px;
            height: 32px;
            padding: 3px;
            border-radius: 999px;
            border: 1px solid var(--border-visible);
            display: flex;
            align-items: center;
            transition: background 180ms ease, border-color 180ms ease;
        }

        .toggle-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--text-disabled);
            transform: translateX(0);
            transition: transform 180ms ease, background 180ms ease;
        }

        .cruise-button.is-active .toggle-track {
            background: var(--text-display);
            border-color: var(--text-display);
        }

        .cruise-button.is-active .toggle-thumb {
            background: var(--black);
            transform: translateX(24px);
        }

        .control-copy {
            flex: 1;
            min-width: 0;
            display: grid;
            gap: 4px;
            text-align: left;
        }

        .control-copy strong,
        .manual-button strong {
            font-size: 1rem;
            font-weight: 500;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        .control-copy span:last-child {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-secondary);
            font-size: var(--caption);
        }

        .signal-dot {
            flex: 0 0 auto;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--border-visible);
        }

        .signal-dot.is-live {
            background: var(--accent);
        }

        .manual-button {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            gap: 6px;
            padding: 16px 24px;
            border: 1px solid var(--text-display);
            background: var(--text-display);
            color: var(--black);
        }

        .manual-button:hover {
            opacity: 0.92;
        }

        .settings-entry {
            position: fixed;
            right: 24px;
            bottom: 24px;
            z-index: 30;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 54px;
            height: 54px;
            min-height: 54px;
            padding: 0;
            border-radius: 12px;
            background: var(--surface);
            border: 1px solid var(--border-visible);
            color: var(--text-display);
            transition: opacity 180ms ease, border-color 180ms ease;
        }

        .settings-entry:hover {
            border-color: var(--text-display);
        }

        .settings-entry.is-hidden {
            opacity: 0;
            pointer-events: none;
        }

        .settings-entry-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
        }

        .settings-entry-icon svg {
            width: 100%;
            height: 100%;
        }

        .drawer-backdrop {
            position: fixed;
            inset: 0;
            z-index: 38;
            background: rgba(0, 0, 0, 0.56);
            opacity: 0;
            pointer-events: none;
            transition: opacity 220ms ease;
        }

        .drawer-backdrop.is-open {
            opacity: 1;
            pointer-events: auto;
        }

        .settings-drawer {
            position: fixed;
            top: 0;
            right: 0;
            z-index: 40;
            width: min(460px, 100vw);
            height: 100vh;
            background: var(--black);
            border-left: 1px solid var(--border-visible);
            transform: translateX(100%);
            transition: transform 300ms cubic-bezier(0.25, 0.1, 0.25, 1);
            display: flex;
            flex-direction: column;
        }

        .settings-drawer.is-open {
            transform: translateX(0);
        }

        .drawer-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .drawer-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .drawer-title {
            margin: 8px 0 0;
            font-size: clamp(1.7rem, 3vw, 2.4rem);
            line-height: 1.05;
            letter-spacing: -0.05em;
            color: var(--text-display);
            font-weight: 500;
        }

        .drawer-close {
            min-height: 44px;
            padding: 0 14px;
            border-radius: 999px;
            border: 1px solid var(--border-visible);
            color: var(--text-secondary);
            font-family: "Space Mono", monospace;
            font-size: 13px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .drawer-close:hover {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }

        .setting-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .setting-title {
            margin-bottom: 16px;
        }

        .theme-grid {
            display: grid;
            gap: 12px;
        }

        .theme-button {
            display: grid;
            grid-template-columns: 68px 1fr auto;
            gap: 14px;
            align-items: center;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            color: var(--text-primary);
            text-align: left;
            transition: border-color 180ms ease, background 180ms ease;
        }

        .theme-button:hover {
            border-color: var(--text-primary);
        }

        .theme-button.is-active {
            background: var(--surface-raised);
            border-color: var(--text-display);
        }

        .theme-preview {
            width: 68px;
            height: 52px;
            border-radius: 8px;
            border: 1px solid var(--preview-border);
            background: var(--preview-page);
            position: relative;
            overflow: hidden;
        }

        .theme-preview::before {
            content: "";
            position: absolute;
            left: 8px;
            right: 8px;
            bottom: 10px;
            height: 12px;
            border: 1px solid var(--preview-border);
            background: var(--preview-surface);
        }

        .theme-preview::after {
            content: "";
            position: absolute;
            top: 8px;
            left: 8px;
            width: 20px;
            height: 20px;
            background-image: radial-gradient(circle, var(--preview-ink) 1px, transparent 1px);
            background-size: 8px 8px;
            opacity: 0.55;
        }

        .theme-name {
            display: block;
            font-size: 0.98rem;
            font-weight: 500;
            color: var(--text-display);
        }

        .theme-copy {
            display: block;
            margin-top: 4px;
        }

        .timing-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .timing-chip {
            min-height: 40px;
            padding: 0 16px;
            border-radius: 999px;
            background: transparent;
            border: 1px solid var(--border-visible);
            color: var(--text-secondary);
            font-family: "Space Mono", monospace;
            font-size: 13px;
            letter-spacing: 0.06em;
            transition: border-color 180ms ease, color 180ms ease, background 180ms ease;
        }

        .timing-chip:hover {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }

        .timing-chip.is-active {
            background: var(--text-display);
            border-color: var(--text-display);
            color: var(--black);
        }

        .custom-input-wrap {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-top: 14px;
            min-height: 48px;
            padding: 0 14px;
            border-radius: 8px;
        }

        .custom-input-wrap input {
            width: 92px;
            background: transparent;
            color: var(--text-display);
            font-family: "Space Mono", monospace;
        }

        .custom-input-wrap span {
            font-family: "Space Mono", monospace;
            font-size: var(--caption);
            line-height: 1.4;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .current-interval {
            margin-top: 12px;
        }

        .pool-grid {
            display: grid;
            gap: 16px;
        }

        .pool-card {
            padding: 18px;
            border-radius: 12px;
        }

        .pool-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .pool-head h3 {
            margin: 0;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-display);
        }

        .chip-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 52px;
            padding-top: 14px;
        }

        .pool-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 32px;
            padding: 0 10px;
            border-radius: 999px;
            background: transparent;
            border: 1px solid var(--border-visible);
            color: var(--text-primary);
            font-family: "Space Mono", monospace;
            font-size: var(--caption);
            line-height: 1.4;
            letter-spacing: 0.04em;
        }

        .chip-remove {
            width: 18px;
            height: 18px;
            padding: 0;
            border-radius: 50%;
            color: var(--text-secondary);
            font-size: 12px;
            line-height: 1;
        }

        .chip-remove:hover {
            color: var(--accent);
        }

        .empty-hint {
            color: var(--text-disabled);
            font-size: var(--body-sm);
            line-height: 1.6;
            padding-top: 4px;
        }

        .editor-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            margin-top: 14px;
        }

        .editor-row input {
            min-width: 0;
            height: 44px;
            padding: 0 12px;
            border-radius: 8px;
            background: var(--surface-raised);
            border: 1px solid var(--border-visible);
            color: var(--text-display);
            font-family: "Space Mono", monospace;
        }

        .editor-row input::placeholder {
            color: var(--text-disabled);
            font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
        }

        .editor-row input:focus {
            border-color: var(--text-display);
        }

        .editor-row button {
            min-width: 84px;
            height: 44px;
            padding: 0 14px;
            border-radius: 999px;
            background: transparent;
            border: 1px solid var(--border-visible);
            color: var(--text-primary);
            font-family: "Space Mono", monospace;
            font-size: 13px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .editor-row button:hover {
            border-color: var(--text-primary);
            color: var(--text-display);
        }

        .reveal {
            opacity: 0;
            animation: fadeIn 360ms cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }

        .animate-swap {
            animation: swapIn 280ms cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes swapIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @media (max-width: 1100px) {
            .display-grid {
                grid-template-columns: 1fr;
            }

            .secondary-column {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 760px) {
            body::before {
                background-size: 14px 14px;
            }

            .app-shell {
                width: min(100% - 20px, 1280px);
                padding: 10px 0 20px;
            }

            .stage {
                min-height: auto;
                padding: 20px;
                gap: 24px;
            }

            .stage::before {
                inset: 10px;
            }

            .brand {
                padding-bottom: 20px;
            }

            .brand-title {
                max-width: 100%;
                font-size: clamp(2.4rem, 14vw, 4rem);
            }

            .hero-panel {
                min-height: 360px;
                padding: 20px;
            }

            .hero-ordinal {
                top: 20px;
                right: 20px;
                font-size: clamp(3.8rem, 18vw, 5.6rem);
            }

            .hero-body {
                padding-right: 72px;
            }

            .secondary-column {
                grid-template-columns: 1fr;
            }

            .controls-strip {
                grid-template-columns: 1fr;
            }

            .cruise-button,
            .manual-button {
                min-height: 80px;
            }

            .settings-entry {
                right: 16px;
                bottom: 16px;
            }

            .settings-drawer {
                width: 100vw;
            }

            .drawer-scroll {
                padding: 20px;
            }

            .theme-button {
                grid-template-columns: 56px 1fr;
            }

            .theme-preview {
                width: 56px;
                height: 46px;
            }

            .theme-mode {
                grid-column: 2;
                justify-self: start;
            }
        }
    </style>
</head>
<body data-theme="paper">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useLayoutEffect, useRef, useCallback } = React;

        const initialCategories = [
            { id: 'key', name: '调性', items: ['G大调', 'D大调', 'A大调', 'E大调', 'B大调', '#F大调', 'F大调', 'bB大调', 'bE大调', 'bA大调', 'bD大调'] },
            { id: 'degree', name: '级数', items: ['Ⅰ', 'Ⅱ', 'Ⅲ', 'Ⅳ', 'Ⅴ', 'Ⅵ', 'Ⅶ'] },
            { id: 'inversion', name: '转位', items: ['1', '1/3', '1/5'] },
            { id: 'shape', name: '指型', items: ['C', 'A', 'G', 'E', 'D'] }
        ];

        const timeOptions = [
            { label: '5 秒', value: 5000 },
            { label: '3 秒', value: 3000 },
            { label: '1 秒', value: 1000 },
            { label: '0.6 秒', value: 600 },
            { label: '自定义', value: 'custom' }
        ];

        const themePresets = [
            {
                id: 'paper',
                name: 'Paper Light',
                copy: '暖白纸面与黑墨层级',
                scheme: 'light',
                previewPage: '#f5f5f5',
                previewSurface: '#ffffff',
                previewBorder: '#cccccc',
                previewInk: '#000000'
            },
            {
                id: 'studio',
                name: 'Studio Light',
                copy: '冷白技术手册与更清晰线框',
                scheme: 'light',
                previewPage: '#efefeb',
                previewSurface: '#fcfcfa',
                previewBorder: '#b9b9b5',
                previewInk: '#000000'
            },
            {
                id: 'oled',
                name: 'OLED Dark',
                copy: '纯黑仪表盘与最强对比',
                scheme: 'dark',
                previewPage: '#000000',
                previewSurface: '#111111',
                previewBorder: '#333333',
                previewInk: '#ffffff'
            },
            {
                id: 'graphite',
                name: 'Graphite Dark',
                copy: '石墨机身与更柔和暗层级',
                scheme: 'dark',
                previewPage: '#0b0b0c',
                previewSurface: '#141415',
                previewBorder: '#37373b',
                previewInk: '#ffffff'
            }
        ];

        const themeStorageKey = 'empire-three-chords-theme';
        const poolStorageKey = 'empire-three-chords-pools';
        const timingStorageKey = 'empire-three-chords-timing';

        const createMap = (list, fallbackValue) => {
            return Object.fromEntries(list.map((category) => [category.id, fallbackValue]));
        };

        const formatIndexToken = (value) => String(value).padStart(2, '0');

        const getResultMetrics = (category, currentValue, segmentCount = 12) => {
            const total = Array.isArray(category?.items) ? category.items.length : 0;
            const rawIndex = total > 0 ? category.items.indexOf(currentValue) : -1;
            const currentIndex = rawIndex >= 0 ? rawIndex + 1 : 0;
            const currentToken = currentIndex > 0 ? formatIndexToken(currentIndex) : '--';
            const totalToken = total > 0 ? formatIndexToken(total) : '--';

            return {
                total,
                currentIndex,
                filled: currentIndex > 0 ? Math.max(1, Math.round((currentIndex / total) * segmentCount)) : 0,
                segmentCount,
                label: `${currentToken} / ${totalToken}`
            };
        };

        const loadCategories = () => {
            try {
                const raw = JSON.parse(localStorage.getItem(poolStorageKey));

                if (!Array.isArray(raw)) {
                    return initialCategories;
                }

                return initialCategories.map((initialCategory) => {
                    const matched = raw.find((entry) => entry && entry.id === initialCategory.id);

                    if (!matched || !Array.isArray(matched.items)) {
                        return initialCategory;
                    }

                    return {
                        ...initialCategory,
                        items: matched.items
                            .filter((item) => typeof item === 'string')
                            .map((item) => item.trim())
                            .filter(Boolean)
                    };
                });
            } catch (error) {
                return initialCategories;
            }
        };

        const loadTiming = () => {
            try {
                const raw = JSON.parse(localStorage.getItem(timingStorageKey));

                if (!raw || (typeof raw.intervalVal !== 'number' && raw.intervalVal !== 'custom')) {
                    return { intervalVal: 3000, customMs: 1800 };
                }

                return {
                    intervalVal: raw.intervalVal,
                    customMs: typeof raw.customMs === 'number' ? raw.customMs : 1800
                };
            } catch (error) {
                return { intervalVal: 3000, customMs: 1800 };
            }
        };

        const formatDuration = (durationMs) => {
            if (durationMs < 1000) {
                return `${durationMs} ms`;
            }

            if (durationMs % 1000 === 0) {
                return `${durationMs / 1000} 秒`;
            }

            return `${(durationMs / 1000).toFixed(1)} 秒`;
        };

        function SegmentBar({ filled, total, compact = false }) {
            return (
                <div className={`segment-bar ${compact ? 'is-compact' : ''}`} aria-hidden="true">
                    {Array.from({ length: total }, (_, index) => (
                        <span key={index} className={`segment ${index < filled ? 'is-filled' : ''}`}></span>
                    ))}
                </div>
            );
        }

        function ResultValue({ value, renderKey, className = '', maxSize = 70, minSize = 24 }) {
            const valueRef = useRef(null);

            useLayoutEffect(() => {
                const element = valueRef.current;

                if (!element) {
                    return undefined;
                }

                const fitText = () => {
                    let nextSize = maxSize;

                    element.style.fontSize = `${maxSize}px`;

                    while (element.scrollWidth > element.clientWidth && nextSize > minSize) {
                        nextSize -= 2;
                        element.style.fontSize = `${nextSize}px`;
                    }
                };

                const frame = window.requestAnimationFrame(fitText);
                window.addEventListener('resize', fitText);

                return () => {
                    window.cancelAnimationFrame(frame);
                    window.removeEventListener('resize', fitText);
                };
            }, [className, maxSize, minSize, renderKey, value]);

            return (
                <div className="result-value-slot">
                    <div key={renderKey} ref={valueRef} className={`result-value animate-swap ${className}`.trim()} title={value}>
                        {value}
                    </div>
                </div>
            );
        }

        function App() {
            const [categories, setCategories] = useState(() => loadCategories());
            const [results, setResults] = useState(() => createMap(loadCategories(), '-'));
            const [renderKeys, setRenderKeys] = useState(() => createMap(loadCategories(), 0));
            const [isAuto, setIsAuto] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [newItems, setNewItems] = useState(() => createMap(initialCategories, ''));
            const [activeTheme, setActiveTheme] = useState(() => {
                try {
                    const storedTheme = localStorage.getItem(themeStorageKey);
                    return themePresets.some((theme) => theme.id === storedTheme) ? storedTheme : 'paper';
                } catch (error) {
                    return 'paper';
                }
            });
            const [intervalVal, setIntervalVal] = useState(() => loadTiming().intervalVal);
            const [customMs, setCustomMs] = useState(() => loadTiming().customMs);

            const activeThemePreset = themePresets.find((theme) => theme.id === activeTheme) || themePresets[0];
            const currentMs = intervalVal === 'custom' ? Math.max(300, customMs || 0) : intervalVal;
            const primaryCategory = categories.find((category) => category.id === 'key') || categories[0] || null;
            const secondaryCategories = categories.filter((category) => !primaryCategory || category.id !== primaryCategory.id);
            const primaryMetrics = primaryCategory
                ? getResultMetrics(primaryCategory, results[primaryCategory.id], 14)
                : { total: 0, currentIndex: 0, filled: 0, segmentCount: 14, label: '-- / --' };

            const generateRandom = useCallback(() => {
                const nextResults = {};
                const nextRenderKeys = {};

                categories.forEach((category) => {
                    if (category.items.length === 0) {
                        nextResults[category.id] = '-';
                    } else {
                        const randomIndex = Math.floor(Math.random() * category.items.length);
                        nextResults[category.id] = category.items[randomIndex];
                    }

                    nextRenderKeys[category.id] = Math.random();
                });

                setResults(nextResults);
                setRenderKeys(nextRenderKeys);
            }, [categories]);

            useEffect(() => {
                generateRandom();
            }, [generateRandom]);

            useEffect(() => {
                document.body.setAttribute('data-theme', activeThemePreset.id);
                document.documentElement.style.colorScheme = activeThemePreset.scheme;

                try {
                    localStorage.setItem(themeStorageKey, activeThemePreset.id);
                } catch (error) {
                }
            }, [activeThemePreset]);

            useEffect(() => {
                try {
                    localStorage.setItem(poolStorageKey, JSON.stringify(categories));
                } catch (error) {
                }
            }, [categories]);

            useEffect(() => {
                try {
                    localStorage.setItem(timingStorageKey, JSON.stringify({ intervalVal, customMs }));
                } catch (error) {
                }
            }, [intervalVal, customMs]);

            useEffect(() => {
                if (!isAuto) {
                    return undefined;
                }

                const timer = window.setInterval(() => {
                    generateRandom();
                }, currentMs);

                return () => window.clearInterval(timer);
            }, [currentMs, generateRandom, isAuto]);

            useEffect(() => {
                if (!showSettings) {
                    return undefined;
                }

                const handleKeydown = (event) => {
                    if (event.key === 'Escape') {
                        setShowSettings(false);
                    }
                };

                window.addEventListener('keydown', handleKeydown);
                return () => window.removeEventListener('keydown', handleKeydown);
            }, [showSettings]);

            useEffect(() => {
                const originalOverflow = document.body.style.overflow;

                if (showSettings) {
                    document.body.style.overflow = 'hidden';
                }

                return () => {
                    document.body.style.overflow = originalOverflow;
                };
            }, [showSettings]);

            const handleAddItem = (categoryId) => {
                const nextValue = newItems[categoryId].trim();

                if (!nextValue) {
                    return;
                }

                setCategories((previousCategories) => previousCategories.map((category) => {
                    if (category.id === categoryId && !category.items.includes(nextValue)) {
                        return { ...category, items: [...category.items, nextValue] };
                    }

                    return category;
                }));

                setNewItems((previousItems) => ({ ...previousItems, [categoryId]: '' }));
            };

            const handleRemoveItem = (categoryId, targetItem) => {
                setCategories((previousCategories) => previousCategories.map((category) => {
                    if (category.id === categoryId) {
                        return { ...category, items: category.items.filter((item) => item !== targetItem) };
                    }

                    return category;
                }));
            };

            return (
                <>
                    <div className="app-shell">
                        <main className="stage reveal">
                            <header className="brand">
                                <h1 className="brand-title">Empire の Three Chords</h1>
                                <p className="brand-cn">帝国の三和弦</p>
                            </header>

                            <section className="display-grid">
                                {primaryCategory && (
                                    <article className="hero-panel reveal" style={{ animationDelay: '80ms' }}>
                                        <div className="hero-ordinal" aria-hidden="true">{formatIndexToken(primaryMetrics.currentIndex)}</div>

                                        <div className="panel-head">
                                            <span className="panel-label">Key</span>
                                        </div>

                                        <div className="hero-body">
                                            <p className="hero-kicker">Primary Result</p>
                                            <ResultValue
                                                value={results[primaryCategory.id]}
                                                renderKey={renderKeys[primaryCategory.id]}
                                                className="result-value-hero"
                                                maxSize={116}
                                                minSize={36}
                                            />
                                        </div>

                                        <div className="hero-footer">
                                            <div className="hero-caption">
                                                <span>调性 / PRIMARY</span>
                                                <span>{formatIndexToken(primaryCategory.items.length)} ITEMS</span>
                                            </div>
                                            <SegmentBar filled={primaryMetrics.filled} total={primaryMetrics.segmentCount} />
                                        </div>
                                    </article>
                                )}

                                <div className="secondary-column">
                                    {secondaryCategories.map((category, index) => {
                                        const metric = getResultMetrics(category, results[category.id], 10);

                                        return (
                                            <article
                                                key={category.id}
                                                className="metric-card reveal"
                                                style={{ animationDelay: `${140 + index * 60}ms` }}
                                            >
                                                <div className="panel-head">
                                                    <span className="panel-label">{category.id}</span>
                                                </div>

                                                <div className="metric-body">
                                                    <p className="metric-copy">{category.name}</p>
                                                    <ResultValue
                                                        value={results[category.id]}
                                                        renderKey={renderKeys[category.id]}
                                                        className="result-value-stat"
                                                        maxSize={60}
                                                        minSize={24}
                                                    />
                                                </div>

                                                <SegmentBar filled={metric.filled} total={metric.segmentCount} compact />
                                            </article>
                                        );
                                    })}
                                </div>
                            </section>

                            <section className="controls-strip">
                                <button
                                    type="button"
                                    className={`cruise-button ${isAuto ? 'is-active' : ''}`}
                                    onClick={() => setIsAuto((previousState) => !previousState)}
                                    aria-pressed={isAuto}
                                >
                                    <span className="toggle-track" aria-hidden="true">
                                        <span className="toggle-thumb"></span>
                                    </span>

                                    <span className="control-copy">
                                        <span className="button-label">Auto Cruise</span>
                                        <strong>{isAuto ? '自动巡航' : '待机'}</strong>
                                        <span>{isAuto ? `当前间隔 ${formatDuration(currentMs)}` : `点击后按 ${formatDuration(currentMs)} 自动随机`}</span>
                                    </span>

                                    <span className={`signal-dot ${isAuto ? 'is-live' : ''}`} aria-hidden="true"></span>
                                </button>

                                <button
                                    type="button"
                                    className="manual-button"
                                    onClick={generateRandom}
                                >
                                    <span className="button-label">Manual Random</span>
                                    <strong>手动随机</strong>
                                </button>
                            </section>
                        </main>
                    </div>

                    <button
                        type="button"
                        className={`settings-entry ${showSettings ? 'is-hidden' : ''}`}
                        onClick={() => setShowSettings(true)}
                        aria-label="打开设置"
                    >
                        <span className="settings-entry-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round">
                                <line x1="4" y1="6" x2="20" y2="6"></line>
                                <circle cx="9" cy="6" r="2"></circle>
                                <line x1="4" y1="12" x2="20" y2="12"></line>
                                <circle cx="15" cy="12" r="2"></circle>
                                <line x1="4" y1="18" x2="20" y2="18"></line>
                                <circle cx="11" cy="18" r="2"></circle>
                            </svg>
                        </span>
                    </button>

                    <div
                        className={`drawer-backdrop ${showSettings ? 'is-open' : ''}`}
                        onClick={() => setShowSettings(false)}
                    ></div>

                    <aside
                        className={`settings-drawer ${showSettings ? 'is-open' : ''}`}
                        role="dialog"
                        aria-modal="true"
                        aria-hidden={!showSettings}
                    >
                        <div className="drawer-scroll">
                            <div className="drawer-header">
                                <div>
                                    <p className="drawer-eyebrow">Control Panel</p>
                                    <h2 className="drawer-title">设置</h2>
                                </div>

                                <button
                                    type="button"
                                    className="drawer-close"
                                    onClick={() => setShowSettings(false)}
                                    aria-label="关闭设置"
                                >
                                    [ Close ]
                                </button>
                            </div>

                            <section className="setting-section">
                                <h3 className="setting-title">Theme Presets</h3>
                                <div className="theme-grid">
                                    {themePresets.map((theme) => (
                                        <button
                                            key={theme.id}
                                            type="button"
                                            className={`theme-button ${activeTheme === theme.id ? 'is-active' : ''}`}
                                            onClick={() => setActiveTheme(theme.id)}
                                        >
                                            <span
                                                className="theme-preview"
                                                style={{
                                                    '--preview-page': theme.previewPage,
                                                    '--preview-surface': theme.previewSurface,
                                                    '--preview-border': theme.previewBorder,
                                                    '--preview-ink': theme.previewInk
                                                }}
                                            ></span>

                                            <span>
                                                <span className="theme-name">{theme.name}</span>
                                                <span className="theme-copy">{theme.copy}</span>
                                            </span>

                                            <span className="theme-mode">{theme.scheme}</span>
                                        </button>
                                    ))}
                                </div>
                            </section>

                            <section className="setting-section">
                                <h3 className="setting-title">Auto Cruise</h3>

                                <div className="timing-row">
                                    {timeOptions.map((option) => (
                                        <button
                                            key={option.label}
                                            type="button"
                                            className={`timing-chip ${intervalVal === option.value ? 'is-active' : ''}`}
                                            onClick={() => setIntervalVal(option.value)}
                                        >
                                            {option.label}
                                        </button>
                                    ))}
                                </div>

                                {intervalVal === 'custom' && (
                                    <div className="custom-input-wrap">
                                        <input
                                            type="number"
                                            min="300"
                                            step="100"
                                            value={customMs}
                                            onChange={(event) => setCustomMs(Number.parseInt(event.target.value, 10) || 0)}
                                        />
                                        <span>ms</span>
                                    </div>
                                )}

                                <p className="current-interval">当前自动巡航间隔 {formatDuration(currentMs)}</p>
                            </section>

                            <section className="setting-section">
                                <h3 className="setting-title">Item Pools</h3>

                                <div className="pool-grid">
                                    {categories.map((category) => (
                                        <section key={category.id} className="pool-card">
                                            <div className="pool-head">
                                                <h3>{category.name}</h3>
                                                <span className="pool-count">{formatIndexToken(category.items.length)} ITEMS</span>
                                            </div>

                                            <div className="chip-list">
                                                {category.items.length > 0 ? category.items.map((item) => (
                                                    <span key={item} className="pool-chip">
                                                        {item}
                                                        <button
                                                            type="button"
                                                            className="chip-remove"
                                                            onClick={() => handleRemoveItem(category.id, item)}
                                                            aria-label={`删除 ${item}`}
                                                        >
                                                            ×
                                                        </button>
                                                    </span>
                                                )) : (
                                                    <span className="empty-hint">当前词池为空，添加后即可参与抽取。</span>
                                                )}
                                            </div>

                                            <form
                                                className="editor-row"
                                                onSubmit={(event) => {
                                                    event.preventDefault();
                                                    handleAddItem(category.id);
                                                }}
                                            >
                                                <input
                                                    type="text"
                                                    value={newItems[category.id]}
                                                    onChange={(event) => setNewItems((previousItems) => ({
                                                        ...previousItems,
                                                        [category.id]: event.target.value
                                                    }))}
                                                    placeholder={`添加 ${category.name}`}
                                                />
                                                <button type="submit">Add</button>
                                            </form>
                                        </section>
                                    ))}
                                </div>
                            </section>
                        </div>
                    </aside>
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
