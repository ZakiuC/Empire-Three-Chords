<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire の Three Chords | 帝国の三和弦</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --bg: #f4ece1;
            --bg-alt: #fbf6ef;
            --panel: rgba(255, 249, 241, 0.72);
            --surface: rgba(255, 255, 255, 0.58);
            --surface-strong: rgba(255, 255, 255, 0.84);
            --elevated: rgba(255, 255, 255, 0.92);
            --border: rgba(39, 31, 23, 0.1);
            --text: #1b1a18;
            --text-soft: rgba(27, 26, 24, 0.66);
            --text-faint: rgba(27, 26, 24, 0.4);
            --accent: #de6d42;
            --accent-2: #2d5b93;
            --accent-soft: rgba(222, 109, 66, 0.16);
            --accent-outline: rgba(222, 109, 66, 0.28);
            --glow-a: rgba(222, 109, 66, 0.24);
            --glow-b: rgba(45, 91, 147, 0.18);
            --button-text: #fff9f4;
            --shadow-color: rgba(128, 69, 40, 0.16);
            --card-shadow: 0 24px 80px rgba(105, 77, 49, 0.12);
            --drawer-shadow: -20px 0 80px rgba(60, 39, 18, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Noto Sans SC", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 12% 18%, var(--glow-a), transparent 28%),
                radial-gradient(circle at 88% 12%, var(--glow-b), transparent 30%),
                linear-gradient(135deg, var(--bg) 0%, var(--bg-alt) 50%, var(--bg) 100%);
            background-attachment: fixed;
            transition: background 460ms ease, color 260ms ease;
            overflow-x: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            inset: 0;
            background:
                linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 110px 110px;
            mix-blend-mode: soft-light;
            opacity: 0.46;
        }

        body::after {
            right: -16vw;
            bottom: -24vh;
            width: 52vw;
            height: 52vw;
            border-radius: 50%;
            background: radial-gradient(circle, var(--glow-a), transparent 68%);
            filter: blur(24px);
            animation: drift 18s ease-in-out infinite alternate;
        }

        body[data-theme="studio"] {
            --bg: #f4ece1;
            --bg-alt: #fbf6ef;
            --panel: rgba(255, 249, 241, 0.72);
            --surface: rgba(255, 255, 255, 0.58);
            --surface-strong: rgba(255, 255, 255, 0.84);
            --elevated: rgba(255, 255, 255, 0.92);
            --border: rgba(39, 31, 23, 0.1);
            --text: #1b1a18;
            --text-soft: rgba(27, 26, 24, 0.66);
            --text-faint: rgba(27, 26, 24, 0.4);
            --accent: #de6d42;
            --accent-2: #2d5b93;
            --accent-soft: rgba(222, 109, 66, 0.16);
            --accent-outline: rgba(222, 109, 66, 0.28);
            --glow-a: rgba(222, 109, 66, 0.24);
            --glow-b: rgba(45, 91, 147, 0.18);
            --button-text: #fff9f4;
            --shadow-color: rgba(128, 69, 40, 0.16);
            --card-shadow: 0 24px 80px rgba(105, 77, 49, 0.12);
            --drawer-shadow: -20px 0 80px rgba(60, 39, 18, 0.14);
        }

        body[data-theme="aurora"] {
            --bg: #08141b;
            --bg-alt: #102530;
            --panel: rgba(7, 20, 27, 0.74);
            --surface: rgba(13, 29, 36, 0.74);
            --surface-strong: rgba(16, 36, 46, 0.88);
            --elevated: rgba(18, 39, 50, 0.94);
            --border: rgba(214, 233, 241, 0.1);
            --text: #eef8fb;
            --text-soft: rgba(238, 248, 251, 0.68);
            --text-faint: rgba(238, 248, 251, 0.42);
            --accent: #58d6b3;
            --accent-2: #f4c96c;
            --accent-soft: rgba(88, 214, 179, 0.16);
            --accent-outline: rgba(88, 214, 179, 0.34);
            --glow-a: rgba(88, 214, 179, 0.22);
            --glow-b: rgba(244, 201, 108, 0.16);
            --button-text: #052018;
            --shadow-color: rgba(2, 14, 18, 0.38);
            --card-shadow: 0 24px 80px rgba(0, 0, 0, 0.32);
            --drawer-shadow: -20px 0 80px rgba(0, 0, 0, 0.4);
        }

        body[data-theme="sand"] {
            --bg: #eee4d5;
            --bg-alt: #f8f1e7;
            --panel: rgba(252, 247, 239, 0.74);
            --surface: rgba(255, 255, 255, 0.6);
            --surface-strong: rgba(255, 255, 255, 0.84);
            --elevated: rgba(255, 251, 245, 0.94);
            --border: rgba(61, 49, 31, 0.1);
            --text: #241f1a;
            --text-soft: rgba(36, 31, 26, 0.64);
            --text-faint: rgba(36, 31, 26, 0.42);
            --accent: #8c653a;
            --accent-2: #396a5c;
            --accent-soft: rgba(140, 101, 58, 0.16);
            --accent-outline: rgba(140, 101, 58, 0.24);
            --glow-a: rgba(140, 101, 58, 0.18);
            --glow-b: rgba(57, 106, 92, 0.16);
            --button-text: #fffaf3;
            --shadow-color: rgba(84, 61, 33, 0.14);
            --card-shadow: 0 24px 80px rgba(104, 87, 63, 0.11);
            --drawer-shadow: -20px 0 80px rgba(84, 61, 33, 0.18);
        }

        body[data-theme="noir"] {
            --bg: #0e1116;
            --bg-alt: #171c24;
            --panel: rgba(15, 17, 22, 0.74);
            --surface: rgba(22, 27, 34, 0.82);
            --surface-strong: rgba(27, 34, 42, 0.9);
            --elevated: rgba(25, 31, 39, 0.96);
            --border: rgba(225, 232, 240, 0.08);
            --text: #f2f4f7;
            --text-soft: rgba(242, 244, 247, 0.66);
            --text-faint: rgba(242, 244, 247, 0.42);
            --accent: #80a7ff;
            --accent-2: #d7dde5;
            --accent-soft: rgba(128, 167, 255, 0.16);
            --accent-outline: rgba(128, 167, 255, 0.3);
            --glow-a: rgba(128, 167, 255, 0.2);
            --glow-b: rgba(215, 221, 229, 0.14);
            --button-text: #07111f;
            --shadow-color: rgba(0, 0, 0, 0.3);
            --card-shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
            --drawer-shadow: -20px 0 80px rgba(0, 0, 0, 0.46);
        }

        body,
        button,
        input {
            font: inherit;
        }

        button,
        input {
            border: none;
            outline: none;
        }

        button {
            cursor: pointer;
            background: none;
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        ::selection {
            background: var(--accent-soft);
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(120, 120, 120, 0.18);
            border-radius: 999px;
        }

        .app-shell {
            position: relative;
            z-index: 1;
            width: min(1120px, calc(100% - 40px));
            min-height: 100vh;
            margin: 0 auto;
            padding: 44px 0 52px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stage {
            position: relative;
            width: 100%;
            padding: 34px;
            border-radius: 34px;
            background: var(--panel);
            border: 1px solid var(--border);
            box-shadow: var(--card-shadow);
            backdrop-filter: blur(24px);
        }

        .stage::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.18), transparent 44%, transparent 100%);
            pointer-events: none;
        }

        .brand {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .brand-en {
            margin: 0;
            color: var(--text-soft);
            font-size: 0.92rem;
            font-weight: 700;
            letter-spacing: 0.32em;
            text-transform: uppercase;
        }

        .brand-cn {
            margin: 16px 0 0;
            font-family: "Noto Serif SC", serif;
            font-size: clamp(2.5rem, 5vw, 4.8rem);
            line-height: 1.04;
            letter-spacing: -0.08em;
        }

        .results-grid {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 18px;
            margin-top: 34px;
        }

        .result-card {
            position: relative;
            overflow: hidden;
            min-height: 238px;
            padding: 22px;
            border-radius: 28px;
            background: var(--surface);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 260ms ease, background 260ms ease, border-color 260ms ease;
        }

        .result-card:hover {
            transform: translateY(-4px);
            background: var(--surface-strong);
            border-color: var(--accent-outline);
        }

        .result-card::after {
            content: "";
            position: absolute;
            right: -28px;
            bottom: -28px;
            width: 164px;
            height: 164px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-soft), transparent 68%);
            pointer-events: none;
        }

        .result-label {
            position: relative;
            z-index: 1;
            color: var(--text-faint);
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .result-value {
            position: relative;
            z-index: 1;
            margin: 20px 0 0;
            font-family: "Noto Serif SC", serif;
            font-size: clamp(3rem, 6vw, 4.4rem);
            line-height: 1.08;
            letter-spacing: -0.08em;
            word-break: break-word;
        }

        .result-meta {
            position: relative;
            z-index: 1;
            margin: 0;
            color: var(--text-soft);
            font-size: 0.92rem;
            line-height: 1.65;
        }

        .controls {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .manual-button,
        .cruise-button {
            min-height: 72px;
            padding: 0 26px;
            border-radius: 24px;
            font-size: 0.98rem;
            font-weight: 800;
            transition: transform 220ms ease, box-shadow 220ms ease, background 220ms ease, border-color 220ms ease;
        }

        .manual-button {
            min-width: 220px;
            color: var(--text);
            background: var(--surface-strong);
            border: 1px solid var(--border);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.06);
        }

        .manual-button:hover {
            transform: translateY(-2px);
            background: var(--elevated);
            border-color: var(--accent-outline);
        }

        .cruise-button {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            min-width: 250px;
            color: var(--text);
            background: var(--surface);
            border: 1px solid var(--border);
        }

        .cruise-button:hover {
            transform: translateY(-2px);
            background: var(--surface-strong);
        }

        .cruise-button.is-active {
            background: var(--accent-soft);
            border-color: var(--accent-outline);
            box-shadow: 0 14px 28px var(--shadow-color);
        }

        .toggle-track {
            position: relative;
            flex: 0 0 58px;
            width: 58px;
            height: 34px;
            padding: 4px;
            border-radius: 999px;
            background: rgba(127, 127, 127, 0.24);
            transition: background 220ms ease;
        }

        .cruise-button.is-active .toggle-track {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
        }

        .toggle-thumb {
            display: block;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.18);
            transform: translateX(0);
            transition: transform 220ms ease;
        }

        .cruise-button.is-active .toggle-thumb {
            transform: translateX(24px);
        }

        .cruise-text {
            text-align: left;
        }

        .cruise-text strong,
        .cruise-text span {
            display: block;
        }

        .cruise-text strong {
            font-size: 0.98rem;
            font-weight: 800;
        }

        .cruise-text span {
            margin-top: 6px;
            color: var(--text-soft);
            font-size: 0.88rem;
            line-height: 1.5;
        }

        .settings-entry {
            position: fixed;
            right: 24px;
            bottom: 24px;
            z-index: 30;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            min-height: 56px;
            padding: 0 18px 0 12px;
            border-radius: 999px;
            background: var(--elevated);
            border: 1px solid var(--border);
            color: var(--text);
            box-shadow: 0 16px 36px rgba(0, 0, 0, 0.08);
            backdrop-filter: blur(14px);
            transition: transform 220ms ease, opacity 220ms ease, border-color 220ms ease, background 220ms ease;
        }

        .settings-entry:hover {
            transform: translateY(-2px);
            border-color: var(--accent-outline);
            background: var(--surface-strong);
        }

        .settings-entry.is-hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(10px);
        }

        .settings-entry-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--accent-soft);
            color: var(--text);
            font-size: 0.95rem;
            font-weight: 800;
        }

        .drawer-backdrop {
            position: fixed;
            inset: 0;
            z-index: 38;
            background: rgba(7, 10, 14, 0.28);
            backdrop-filter: blur(6px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 240ms ease;
        }

        .drawer-backdrop.is-open {
            opacity: 1;
            pointer-events: auto;
        }

        .settings-drawer {
            position: fixed;
            top: 0;
            right: 0;
            z-index: 40;
            width: min(460px, 100vw);
            height: 100vh;
            background: var(--panel);
            border-left: 1px solid var(--border);
            box-shadow: var(--drawer-shadow);
            backdrop-filter: blur(28px);
            transform: translateX(100%);
            transition: transform 320ms cubic-bezier(0.22, 1, 0.36, 1);
            display: flex;
            flex-direction: column;
        }

        .settings-drawer.is-open {
            transform: translateX(0);
        }

        .drawer-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 26px 22px 32px;
        }

        .drawer-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
        }

        .drawer-eyebrow {
            margin: 0;
            color: var(--text-faint);
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .drawer-title {
            margin: 10px 0 0;
            font-family: "Noto Serif SC", serif;
            font-size: clamp(1.8rem, 3vw, 2.6rem);
            line-height: 1.08;
            letter-spacing: -0.05em;
        }

        .drawer-copy {
            margin: 12px 0 0;
            color: var(--text-soft);
            font-size: 0.96rem;
            line-height: 1.75;
        }

        .drawer-close {
            flex: 0 0 auto;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 1.2rem;
        }

        .setting-section {
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .setting-title {
            margin: 0;
            font-size: 1rem;
            font-weight: 800;
        }

        .setting-copy {
            margin: 10px 0 0;
            color: var(--text-soft);
            font-size: 0.92rem;
            line-height: 1.7;
        }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        .theme-button {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            border-radius: 20px;
            background: var(--surface);
            border: 1px solid transparent;
            color: var(--text);
            text-align: left;
            transition: transform 220ms ease, background 220ms ease, border-color 220ms ease;
        }

        .theme-button:hover {
            transform: translateY(-2px);
            background: var(--surface-strong);
            border-color: var(--accent-outline);
        }

        .theme-button.is-active {
            background: var(--accent-soft);
            border-color: var(--accent-outline);
        }

        .theme-swatch {
            flex: 0 0 38px;
            width: 38px;
            height: 38px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--swatch-start), var(--swatch-end));
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.24);
        }

        .theme-name {
            display: block;
            font-size: 0.94rem;
            font-weight: 800;
        }

        .theme-copy {
            display: block;
            margin-top: 4px;
            color: var(--text-soft);
            font-size: 0.82rem;
            line-height: 1.5;
        }

        .timing-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
        }

        .timing-chip {
            min-height: 44px;
            padding: 0 16px;
            border-radius: 999px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-soft);
            font-size: 0.9rem;
            font-weight: 700;
            transition: transform 220ms ease, background 220ms ease, border-color 220ms ease, color 220ms ease;
        }

        .timing-chip:hover {
            transform: translateY(-1px);
            background: var(--surface-strong);
        }

        .timing-chip.is-active {
            background: var(--accent-soft);
            border-color: var(--accent-outline);
            color: var(--text);
        }

        .custom-input-wrap {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 14px;
            min-height: 48px;
            padding: 0 14px;
            border-radius: 16px;
            background: var(--surface-strong);
            border: 1px solid var(--border);
        }

        .custom-input-wrap input {
            width: 92px;
            background: transparent;
            color: var(--text);
        }

        .current-interval {
            margin-top: 12px;
            color: var(--text-faint);
            font-size: 0.86rem;
            line-height: 1.6;
        }

        .pool-grid {
            display: grid;
            gap: 14px;
            margin-top: 18px;
        }

        .pool-card {
            padding: 18px;
            border-radius: 22px;
            background: var(--surface);
            border: 1px solid var(--border);
        }

        .pool-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .pool-head h3 {
            margin: 0;
            font-size: 0.96rem;
            font-weight: 800;
        }

        .pool-count {
            display: inline-flex;
            align-items: center;
            min-height: 30px;
            padding: 0 10px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--text);
            font-size: 0.8rem;
            font-weight: 700;
        }

        .chip-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            min-height: 48px;
        }

        .pool-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 36px;
            padding: 0 12px;
            border-radius: 999px;
            background: var(--elevated);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 0.88rem;
            font-weight: 600;
        }

        .chip-remove {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            color: var(--text-faint);
            font-size: 0.9rem;
            line-height: 1;
            padding: 0;
        }

        .chip-remove:hover {
            color: #d34c4c;
            background: rgba(211, 76, 76, 0.1);
        }

        .empty-hint {
            color: var(--text-faint);
            font-size: 0.88rem;
            line-height: 1.65;
        }

        .editor-row {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }

        .editor-row input {
            flex: 1;
            min-width: 0;
            height: 46px;
            padding: 0 14px;
            border-radius: 14px;
            background: var(--elevated);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .editor-row input::placeholder {
            color: var(--text-faint);
        }

        .editor-row input:focus {
            border-color: var(--accent-outline);
            box-shadow: 0 0 0 6px var(--accent-soft);
        }

        .editor-row button {
            min-width: 72px;
            height: 46px;
            border-radius: 14px;
            background: var(--surface-strong);
            border: 1px solid var(--border);
            color: var(--text);
            font-weight: 800;
        }

        .editor-row button:hover {
            background: var(--elevated);
            border-color: var(--accent-outline);
        }

        .reveal {
            opacity: 0;
            transform: translateY(16px);
            animation: riseIn 540ms ease forwards;
        }

        .animate-swap {
            animation: swapIn 520ms cubic-bezier(0.18, 1, 0.32, 1) forwards;
        }

        @keyframes riseIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes swapIn {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.97);
                filter: blur(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        @keyframes drift {
            from {
                transform: translate3d(0, 0, 0) scale(1);
            }

            to {
                transform: translate3d(-30px, -26px, 0) scale(1.08);
            }
        }

        @media (max-width: 980px) {
            .results-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 720px) {
            .app-shell {
                width: min(100% - 24px, 1120px);
                padding: 20px 0 28px;
            }

            .stage {
                padding: 22px;
                border-radius: 28px;
            }

            .brand-en {
                font-size: 0.8rem;
                letter-spacing: 0.22em;
            }

            .results-grid {
                grid-template-columns: 1fr;
                margin-top: 26px;
            }

            .controls {
                margin-top: 24px;
            }

            .manual-button,
            .cruise-button {
                width: 100%;
                justify-content: center;
            }

            .settings-entry {
                right: 16px;
                bottom: 16px;
                min-height: 52px;
            }

            .theme-grid {
                grid-template-columns: 1fr;
            }

            .settings-drawer {
                width: 100vw;
            }
        }
    </style>
</head>
<body data-theme="studio">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const initialCategories = [
            { id: 'key', name: '调性', items: ['G大调', 'D大调', 'A大调', 'E大调', 'B大调', '#F大调', 'F大调', 'bB大调', 'bE大调', 'bA大调', 'bD大调'] },
            { id: 'degree', name: '级数', items: ['Ⅰ', 'Ⅱ', 'Ⅲ', 'Ⅳ', 'Ⅴ', 'Ⅵ', 'Ⅶ'] },
            { id: 'inversion', name: '转位', items: ['1', '1/3', '1/5'] },
            { id: 'shape', name: '指型', items: ['C', 'A', 'G', 'E', 'D'] }
        ];

        const timeOptions = [
            { label: '5 秒', value: 5000 },
            { label: '3 秒', value: 3000 },
            { label: '1 秒', value: 1000 },
            { label: '0.6 秒', value: 600 },
            { label: '自定义', value: 'custom' }
        ];

        const themePresets = [
            {
                id: 'studio',
                name: '留白工作室',
                copy: '奶油底与墨蓝边界',
                swatchStart: '#de6d42',
                swatchEnd: '#2d5b93',
                scheme: 'light'
            },
            {
                id: 'aurora',
                name: '极光波段',
                copy: '深海底与薄荷亮点',
                swatchStart: '#58d6b3',
                swatchEnd: '#f4c96c',
                scheme: 'dark'
            },
            {
                id: 'sand',
                name: '砂岩沙盘',
                copy: '暖沙背景与松绿收边',
                swatchStart: '#8c653a',
                swatchEnd: '#396a5c',
                scheme: 'light'
            },
            {
                id: 'noir',
                name: '夜幕制图',
                copy: '石墨底与冷银蓝光',
                swatchStart: '#80a7ff',
                swatchEnd: '#d7dde5',
                scheme: 'dark'
            }
        ];

        const themeStorageKey = 'empire-three-chords-theme';
        const poolStorageKey = 'empire-three-chords-pools';
        const timingStorageKey = 'empire-three-chords-timing';

        const createMap = (list, fallbackValue) => {
            return Object.fromEntries(list.map((category) => [category.id, fallbackValue]));
        };

        const loadCategories = () => {
            try {
                const raw = JSON.parse(localStorage.getItem(poolStorageKey));

                if (!Array.isArray(raw)) {
                    return initialCategories;
                }

                return initialCategories.map((initialCategory) => {
                    const matched = raw.find((entry) => entry && entry.id === initialCategory.id);

                    if (!matched || !Array.isArray(matched.items)) {
                        return initialCategory;
                    }

                    return {
                        ...initialCategory,
                        items: matched.items
                            .filter((item) => typeof item === 'string')
                            .map((item) => item.trim())
                            .filter(Boolean)
                    };
                });
            } catch (error) {
                return initialCategories;
            }
        };

        const loadTiming = () => {
            try {
                const raw = JSON.parse(localStorage.getItem(timingStorageKey));

                if (!raw || (typeof raw.intervalVal !== 'number' && raw.intervalVal !== 'custom')) {
                    return { intervalVal: 3000, customMs: 1800 };
                }

                return {
                    intervalVal: raw.intervalVal,
                    customMs: typeof raw.customMs === 'number' ? raw.customMs : 1800
                };
            } catch (error) {
                return { intervalVal: 3000, customMs: 1800 };
            }
        };

        const formatDuration = (durationMs) => {
            if (durationMs < 1000) {
                return `${durationMs} ms`;
            }

            if (durationMs % 1000 === 0) {
                return `${durationMs / 1000} 秒`;
            }

            return `${(durationMs / 1000).toFixed(1)} 秒`;
        };

        function App() {
            const [categories, setCategories] = useState(() => loadCategories());
            const [results, setResults] = useState(() => createMap(loadCategories(), '-'));
            const [renderKeys, setRenderKeys] = useState(() => createMap(loadCategories(), 0));
            const [isAuto, setIsAuto] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [newItems, setNewItems] = useState(() => createMap(initialCategories, ''));
            const [activeTheme, setActiveTheme] = useState(() => {
                try {
                    const storedTheme = localStorage.getItem(themeStorageKey);
                    return themePresets.some((theme) => theme.id === storedTheme) ? storedTheme : 'studio';
                } catch (error) {
                    return 'studio';
                }
            });
            const [intervalVal, setIntervalVal] = useState(() => loadTiming().intervalVal);
            const [customMs, setCustomMs] = useState(() => loadTiming().customMs);

            const activeThemePreset = themePresets.find((theme) => theme.id === activeTheme) || themePresets[0];
            const currentMs = intervalVal === 'custom' ? Math.max(300, customMs || 0) : intervalVal;

            const generateRandom = useCallback(() => {
                const nextResults = {};
                const nextRenderKeys = {};

                categories.forEach((category) => {
                    if (category.items.length === 0) {
                        nextResults[category.id] = '-';
                    } else {
                        const randomIndex = Math.floor(Math.random() * category.items.length);
                        nextResults[category.id] = category.items[randomIndex];
                    }

                    nextRenderKeys[category.id] = Math.random();
                });

                setResults(nextResults);
                setRenderKeys(nextRenderKeys);
            }, [categories]);

            useEffect(() => {
                generateRandom();
            }, [generateRandom]);

            useEffect(() => {
                document.body.setAttribute('data-theme', activeThemePreset.id);
                document.documentElement.style.colorScheme = activeThemePreset.scheme;

                try {
                    localStorage.setItem(themeStorageKey, activeThemePreset.id);
                } catch (error) {
                }
            }, [activeThemePreset]);

            useEffect(() => {
                try {
                    localStorage.setItem(poolStorageKey, JSON.stringify(categories));
                } catch (error) {
                }
            }, [categories]);

            useEffect(() => {
                try {
                    localStorage.setItem(timingStorageKey, JSON.stringify({ intervalVal, customMs }));
                } catch (error) {
                }
            }, [intervalVal, customMs]);

            useEffect(() => {
                if (!isAuto) {
                    return undefined;
                }

                const timer = window.setInterval(() => {
                    generateRandom();
                }, currentMs);

                return () => window.clearInterval(timer);
            }, [currentMs, generateRandom, isAuto]);

            useEffect(() => {
                if (!showSettings) {
                    return undefined;
                }

                const handleKeydown = (event) => {
                    if (event.key === 'Escape') {
                        setShowSettings(false);
                    }
                };

                window.addEventListener('keydown', handleKeydown);
                return () => window.removeEventListener('keydown', handleKeydown);
            }, [showSettings]);

            useEffect(() => {
                const originalOverflow = document.body.style.overflow;

                if (showSettings) {
                    document.body.style.overflow = 'hidden';
                }

                return () => {
                    document.body.style.overflow = originalOverflow;
                };
            }, [showSettings]);

            const handleAddItem = (categoryId) => {
                const nextValue = newItems[categoryId].trim();

                if (!nextValue) {
                    return;
                }

                setCategories((previousCategories) => previousCategories.map((category) => {
                    if (category.id === categoryId && !category.items.includes(nextValue)) {
                        return { ...category, items: [...category.items, nextValue] };
                    }

                    return category;
                }));

                setNewItems((previousItems) => ({ ...previousItems, [categoryId]: '' }));
            };

            const handleRemoveItem = (categoryId, targetItem) => {
                setCategories((previousCategories) => previousCategories.map((category) => {
                    if (category.id === categoryId) {
                        return { ...category, items: category.items.filter((item) => item !== targetItem) };
                    }

                    return category;
                }));
            };

            return (
                <>
                    <div className="app-shell">
                        <main className="stage reveal">
                            <header className="brand">
                                <p className="brand-en">Empire の Three Chords</p>
                                <h1 className="brand-cn">帝国の三和弦</h1>
                            </header>

                            <section className="results-grid">
                                {categories.map((category, index) => (
                                    <article
                                        key={category.id}
                                        className="result-card reveal"
                                        style={{ animationDelay: `${120 + index * 70}ms` }}
                                    >
                                        <div className="result-label">{category.name}</div>
                                        <div key={renderKeys[category.id]} className="result-value animate-swap">
                                            {results[category.id]}
                                        </div>
                                        <p className="result-meta">随机结果即时生成，保持视线只落在当前练习目标。</p>
                                    </article>
                                ))}
                            </section>

                            <section className="controls">
                                <button
                                    type="button"
                                    className={`cruise-button ${isAuto ? 'is-active' : ''}`}
                                    onClick={() => setIsAuto((previousState) => !previousState)}
                                    aria-pressed={isAuto}
                                >
                                    <span className="toggle-track">
                                        <span className="toggle-thumb"></span>
                                    </span>
                                    <span className="cruise-text">
                                        <strong>自动巡航</strong>
                                        <span>{isAuto ? `已开启，按 ${formatDuration(currentMs)} 持续刷新。` : '关闭状态，点击后开始持续随机。'}</span>
                                    </span>
                                </button>

                                <button
                                    type="button"
                                    className="manual-button"
                                    onClick={generateRandom}
                                >
                                    手动随机
                                </button>
                            </section>
                        </main>
                    </div>

                    <button
                        type="button"
                        className={`settings-entry ${showSettings ? 'is-hidden' : ''}`}
                        onClick={() => setShowSettings(true)}
                    >
                        <span className="settings-entry-icon">设</span>
                        <span>设置</span>
                    </button>

                    <div
                        className={`drawer-backdrop ${showSettings ? 'is-open' : ''}`}
                        onClick={() => setShowSettings(false)}
                    ></div>

                    <aside
                        className={`settings-drawer ${showSettings ? 'is-open' : ''}`}
                        role="dialog"
                        aria-modal="true"
                        aria-hidden={!showSettings}
                    >
                        <div className="drawer-scroll">
                            <div className="drawer-header">
                                <div>
                                    <p className="drawer-eyebrow">Settings</p>
                                    <h2 className="drawer-title">设置面板</h2>
                                    <p className="drawer-copy">
                                        主界面保持简洁，所有可调参数都收进这里。主题、自动巡航节奏和词池内容都可以单独维护。
                                    </p>
                                </div>

                                <button
                                    type="button"
                                    className="drawer-close"
                                    onClick={() => setShowSettings(false)}
                                    aria-label="关闭设置"
                                >
                                    ×
                                </button>
                            </div>

                            <section className="setting-section">
                                <h3 className="setting-title">主题预设</h3>
                                <p className="setting-copy">主界面不展示主题卡片，但你仍然可以在这里切换整体氛围。</p>
                                <div className="theme-grid">
                                    {themePresets.map((theme) => (
                                        <button
                                            key={theme.id}
                                            type="button"
                                            className={`theme-button ${activeTheme === theme.id ? 'is-active' : ''}`}
                                            onClick={() => setActiveTheme(theme.id)}
                                        >
                                            <span
                                                className="theme-swatch"
                                                style={{ '--swatch-start': theme.swatchStart, '--swatch-end': theme.swatchEnd }}
                                            ></span>
                                            <span>
                                                <span className="theme-name">{theme.name}</span>
                                                <span className="theme-copy">{theme.copy}</span>
                                            </span>
                                        </button>
                                    ))}
                                </div>
                            </section>

                            <section className="setting-section">
                                <h3 className="setting-title">自动巡航节奏</h3>
                                <p className="setting-copy">你可以在这里调整自动巡航的刷新间隔，主界面只显示开关状态。</p>

                                <div className="timing-row">
                                    {timeOptions.map((option) => (
                                        <button
                                            key={option.label}
                                            type="button"
                                            className={`timing-chip ${intervalVal === option.value ? 'is-active' : ''}`}
                                            onClick={() => setIntervalVal(option.value)}
                                        >
                                            {option.label}
                                        </button>
                                    ))}
                                </div>

                                {intervalVal === 'custom' && (
                                    <div className="custom-input-wrap">
                                        <input
                                            type="number"
                                            min="300"
                                            step="100"
                                            value={customMs}
                                            onChange={(event) => setCustomMs(Number.parseInt(event.target.value, 10) || 0)}
                                        />
                                        <span>ms</span>
                                    </div>
                                )}

                                <p className="current-interval">当前自动巡航间隔：{formatDuration(currentMs)}</p>
                            </section>

                            <section className="setting-section">
                                <h3 className="setting-title">词池配置</h3>
                                <p className="setting-copy">增删候选项后会立即参与随机结果，并自动保存在本地。</p>

                                <div className="pool-grid">
                                    {categories.map((category) => (
                                        <section key={category.id} className="pool-card">
                                            <div className="pool-head">
                                                <h3>{category.name}</h3>
                                                <span className="pool-count">{category.items.length} 项</span>
                                            </div>

                                            <div className="chip-list">
                                                {category.items.length > 0 ? category.items.map((item) => (
                                                    <span key={item} className="pool-chip">
                                                        {item}
                                                        <button
                                                            type="button"
                                                            className="chip-remove"
                                                            onClick={() => handleRemoveItem(category.id, item)}
                                                            aria-label={`删除 ${item}`}
                                                        >
                                                            ×
                                                        </button>
                                                    </span>
                                                )) : (
                                                    <span className="empty-hint">当前词池为空，添加后即可参与抽取。</span>
                                                )}
                                            </div>

                                            <form
                                                className="editor-row"
                                                onSubmit={(event) => {
                                                    event.preventDefault();
                                                    handleAddItem(category.id);
                                                }}
                                            >
                                                <input
                                                    type="text"
                                                    value={newItems[category.id]}
                                                    onChange={(event) => setNewItems((previousItems) => ({
                                                        ...previousItems,
                                                        [category.id]: event.target.value
                                                    }))}
                                                    placeholder={`添加 ${category.name}`}
                                                />
                                                <button type="submit">添加</button>
                                            </form>
                                        </section>
                                    ))}
                                </div>
                            </section>
                        </div>
                    </aside>
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
